name: Bug Report / Bug 反馈
description: Report a reproducible bug or unexpected behavior. / 反馈可复现的 Bug 或异常行为。
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please attempt to diagnose the issue with an AI coding assistant such as Claude Code, Codex, Cursor, or GitHub Copilot. Many issues can be resolved by sharing the error output and configuration with these tools. Please open an issue only after such an attempt has failed.

        提交前，请先借助 Claude Code、Codex、Cursor 或 GitHub Copilot 等 AI 编程助手进行排查。多数问题在向其提供报错信息与相关配置后即可定位。仅在上述尝试均未能解决时，再提交 issue。

        Reports that do not follow this template, omit the checklist, or lack reproduction steps may be closed without further response.
        未按本模板填写、未完成预检清单或缺少复现步骤的反馈，可能在不进一步回复的情况下被关闭。

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist / 预检清单
      description: All items must be confirmed before submission. / 提交前请确认以下所有事项。
      options:
        - label: I have searched both **open and closed issues** and confirmed this is not a duplicate. / 我已检索全部 **open 与 closed 的 issue**，确认此问题未被提交过。
          required: true
        - label: I have reviewed the **README** and related documentation. / 我已阅读 **README** 及相关文档。
          required: true
        - label: I am running the **latest release** and the issue still reproduces. / 我使用的是**最新版本**，问题仍可复现。
          required: true
        - label: I have attempted to diagnose this issue using **at least one AI coding assistant** (Claude Code, Codex, Cursor, GitHub Copilot, etc.) without success. / 我已使用**至少一种 AI 编程助手**（Claude Code、Codex、Cursor、GitHub Copilot 等）尝试排查，未能解决。
          required: true
        - label: I have provided **reproduction steps, expected and actual behavior, and relevant logs** below. / 我已在下文提供**复现步骤、预期与实际行为以及相关日志**。
          required: true
        - label: I understand this is a **community project provided without any service-level guarantee**. / 我理解本项目为**社区项目，不提供任何服务级别保障**。
          required: true

  - type: textarea
    id: ai-attempts
    attributes:
      label: AI diagnosis summary / AI 排查记录
      description: |
        Briefly describe which AI assistant you used, what suggestions it provided, and why those suggestions did not resolve the issue.
        请简要说明使用了哪一款 AI 助手、其给出的建议，以及这些建议未能解决问题的原因。
      placeholder: |
        Example: Claude Code suggested verifying configurations X and Y; both were confirmed correct. It then proposed checking Z, which is not applicable in this code path.
        示例：Claude Code 建议核对配置 X 与 Y，均已确认无误；其后建议检查 Z，但该代码路径中并不涉及 Z。
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: Binary version, Docker image tag, or commit SHA. / 二进制版本、Docker 镜像 tag 或 commit SHA。
      placeholder: v1.0.1 / ghcr.io/quorinex/kiro-go:latest / 1f54f29
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method / 部署方式
      options:
        - Docker Compose
        - Docker (docker run)
        - Built from source / 源码编译
        - Other (please specify in the body) / 其他（请在正文中说明）
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system / 操作系统
      placeholder: Ubuntu 22.04 / Windows 11 24H2 / macOS 14.5
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce / 复现步骤
      description: |
        Provide the minimal sequence of steps required to reproduce the issue from a clean state, including the exact requests, configuration, and any non-default options.
        请提供从干净环境复现该问题所需的最小步骤，包括完整的请求、配置以及任何非默认选项。
      placeholder: |
        1. Start the service with `docker-compose up -d` using the configuration below.
        2. Add an account through the admin panel.
        3. Send: curl -X POST ...
        4. The response is 500; expected 200.
        ---
        1. 使用下方配置执行 `docker-compose up -d` 启动服务。
        2. 通过管理后台添加账号。
        3. 发送：curl -X POST ...
        4. 返回 500，预期为 200。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and error output / 日志与报错信息
      description: |
        Include the full stack trace and surrounding log lines. Please redact tokens, cookies, and personal information before submission.
        请提供完整堆栈以及前后相关日志。提交前请自行去除 token、cookie 及个人信息。
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context / 补充信息
      description: |
        Screenshots, network or proxy configuration, related issues, recent changes, or any other relevant information.
        如截图、网络或代理配置、相关 issue、近期变更，以及其他可能相关的信息。
    validations:
      required: false
