name: Feature Request / 功能建议
description: Suggest a new idea or new functionality. / 提出新想法或新功能。
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues and the README to confirm this functionality is not already supported. If unsure whether existing options or a small script can already meet your needs, an AI coding assistant (Claude Code, Codex, etc.) may help clarify. A working pull request is the most effective path to landing a feature; maintainers may decline requests that fall outside the project's scope.

        提交前请先搜索已有 issue 与 README，确认该功能尚未提供。若不确定现有功能或简单脚本是否已能满足需求，可先借助 AI 编程助手（Claude Code、Codex 等）协助分析。提交可用的 Pull Request 是落地新功能最有效的方式；维护者保留拒绝超出项目范围之需求的权利。

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe. / 该需求是否源于某个具体问题？
      description: |
        A clear and concise description of what the problem is.
        请简明描述实际遇到的问题。
      placeholder: |
        e.g., I'm frustrated when I need to do X manually because Y is missing.
        例如：因为缺少 Y，每次都要手动做 X，很麻烦。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like / 期望的解决方案
      description: |
        A clear and concise description of what you want to happen.
        请简明描述希望实现的效果。
      placeholder: |
        e.g., It would be great if the system could automatically handle X by doing Y.
        例如：希望系统能够通过 Y 自动处理 X。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered / 已考虑的替代方案
      description: |
        Include any alternative solutions or features you've considered.
        请列出已考虑或尝试过的其他方案。

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to submit a PR? / 是否愿意提交 PR？
      options:
        - "Yes, I will submit a PR. / 愿意，我将提交 PR。"
        - "Yes, with some guidance. / 愿意，但需要一定指导。"
        - "No. / 不愿意。"
